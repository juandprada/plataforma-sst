<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plataforma de Documentos SST</title>
  <link rel="stylesheet" href="styles.css?v=11">
  <link rel="stylesheet" href="print.css?v=11" media="print">
  <!-- La app fija aquí el tamaño de página según la orientación del formato. -->
  <style id="page-orient">@page { size: Letter; margin: 0.6in; }</style>
</head>
<body>
  <div class="app-chrome">
    <header class="app-header">
      <h1>Plataforma de Documentos SST</h1>
      <p>Selecciona un formato y una empresa, genera y descarga el PDF.</p>
    </header>

    <section class="controls">
      <div class="field">
        <label for="sel-formato">Formato</label>
        <select id="sel-formato"></select>
      </div>
      <div class="field">
        <label for="sel-empresa">Empresa</label>
        <select id="sel-empresa"></select>
      </div>
      <p id="estado" class="estado" role="status"></p>
    </section>

    <p class="hint">
      Elige un <strong>formato</strong> y una <strong>empresa</strong>: el PDF se genera
      solo y aparece abajo en el visor, con controles para hacer zoom, imprimir o
      descargar. Funciona también en el celular.
    </p>
  </div>

  <!-- Visor del PDF generado (controles nativos + botón de descarga). -->
  <section id="visor" hidden></section>

  <!-- Fuente de render para html2pdf (oculta con un contenedor recortado a 0). -->
  <div id="salida-host" aria-hidden="true"><main id="salida" aria-live="polite"></main></div>

  <script src="assets/vendor/html2pdf.bundle.min.js"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
