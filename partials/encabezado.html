<!--
  Encabezado uniforme (mismo patrón que el header de los .docx del SG-SST):
  logo | titulo + AÑO | Código/Versión/Página.
  Tokens: {{LOGO}}, {{TITULO}}, {{ANIO}}, {{CODIGO}}, {{VERSION}}
  La app lo rellena y lo antepone al cuerpo de cada plantilla.
-->
<header class="doc-header">
  <div class="dh-logo">{{LOGO}}</div>
  <div class="dh-titulo">
    <div class="dh-nombre">{{TITULO}}</div>
    <div class="dh-anio">AÑO: {{ANIO}}</div>
  </div>
  <table class="dh-meta">
    <tr><th>Código</th><td>{{CODIGO}}</td></tr>
    <tr><th>Versión</th><td>{{VERSION}}</td></tr>
    <tr><th>Página</th><td class="dh-pagina">&nbsp;</td></tr>
  </table>
</header>
